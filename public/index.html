<!DOCTYPE html>\n<html lang="pt-BR">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Validação de Dados Médicos</title>\n    <script>\n        function validateForm() {\n            let endereco = document.forms["medicalDataForm"]["endereco"].value;\n            let cpf = document.forms["medicalDataForm"]["cpf"].value;\n            let nomePaciente = document.forms["medicalDataForm"]["nomePaciente"].value;\n            let nomeDoutor = document.forms["medicalDataForm"]["nomeDoutor"].value;\n            let crmDoutor = document.forms["medicalDataForm"]["crmDoutor"].value;\n            let cid = document.forms["medicalDataForm"]["cid"].value;\n            let dataEmissao = document.forms["medicalDataForm"]["dataEmissao"].value;\n            let dataRepouso = document.forms["medicalDataForm"]["dataRepouso"].value;\n\n            if (!endereco || !cpf || !nomePaciente || !nomeDoutor || !crmDoutor || !cid || !dataEmissao || !dataRepouso) {\n                alert("Por favor, preencha todos os campos.");\n                return false;\n            }\n            return true;\n        }\n    </script>\n</head>\n<body>\n    <h1>Formulário de Validação de Dados Médicos</h1>\n    <form name="medicalDataForm" onsubmit="return validateForm()">\n        <label for="endereco">Endereço:</label>\n        <input type="text" id="endereco" name="endereco"><br><br>\n\n        <label for="cpf">CPF:</label>\n        <input type="text" id="cpf" name="cpf" maxlength="11"><br><br>\n\n        <label for="nomePaciente">Nome do Paciente:</label>\n        <input type="text" id="nomePaciente" name="nomePaciente"><br><br>\n\n        <label for="nomeDoutor">Nome do Doutor:</label>\n        <input type="text" id="nomeDoutor" name="nomeDoutor"><br><br>\n\n        <label for="crmDoutor">CRM do Doutor:</label>\n        <input type="text" id="crmDoutor" name="crmDoutor"><br><br>\n\n        <label for="cid">CID:</label>\n        <input type="text" id="cid" name="cid"><br><br>\n\n        <label for="dataEmissao">Data de Emissão:</label>\n        <input type="date" id="dataEmissao" name="dataEmissao"><br><br>\n\n        <label for="dataRepouso">Data de Repouso:</label>\n        <input type="date" id="dataRepouso" name="dataRepouso"><br><br>\n\n        <input type="submit" value="Criar">\n        <input type="button" value="Listar">\n        <input type="button" value="Editar">\n        <input type="button" value="Deletar">\n    </form>\n</body>\n</html>
